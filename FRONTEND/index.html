  <meta name="theme-color" content="#0a0a0f">

  <meta name="keywords" content="anonymous, confession, voice, social, secrets, whisper, morpheus, echo">

  <link rel="apple-touch-icon" href="/morpheus-logo.png">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/style.css">
  
</head>
<body>
  <div class="loading-screen" id="loading-screen">
    <div class="loading-orb"></div>
    <p class="loading-text">MORPHEUS ECHO</p>
  </div>
  
  <div id="root"></div>
  
  <script type="module" src="/src/main.jsx"></script>
  
  <script>
    // Hide loading screen when React mounts
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('loading-screen');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.style.display = 'none';
          }, 500);
        }
      }, 1500);
    });
  </script>
</body>
